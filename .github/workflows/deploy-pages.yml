name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PAGES_PROJECT: sasha-persholja-music-catalogue

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required Cloudflare secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLOUDFLARE_API_TOKEN:-}" ]]; then
            echo "Missing GitHub repository secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi
          if [[ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "Missing GitHub repository secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Build static catalogue
        run: npm run build

      - name: Create Cloudflare Pages project when missing
        shell: bash
        run: |
          set -euo pipefail

          API_BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          PROJECT_URL="${API_BASE}/${CLOUDFLARE_PAGES_PROJECT}"

          HTTP_STATUS=$(curl --silent --show-error --output /tmp/pages-project.json \
            --write-out "%{http_code}" \
            --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            --header "Content-Type: application/json" \
            "${PROJECT_URL}")

          if [[ "${HTTP_STATUS}" == "200" ]]; then
            echo "Cloudflare Pages project already exists: ${CLOUDFLARE_PAGES_PROJECT}"
          elif [[ "${HTTP_STATUS}" == "404" ]]; then
            echo "Creating Cloudflare Pages project: ${CLOUDFLARE_PAGES_PROJECT}"
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              --header "Content-Type: application/json" \
              --data "{\"name\":\"${CLOUDFLARE_PAGES_PROJECT}\",\"production_branch\":\"main\"}" \
              "${API_BASE}"
          else
            echo "Cloudflare API project check failed with HTTP ${HTTP_STATUS}:" >&2
            cat /tmp/pages-project.json >&2
            exit 1
          fi

      - name: Deploy dist to Cloudflare Pages
        run: >-
          npx --yes wrangler@4 pages deploy dist
          --project-name=sasha-persholja-music-catalogue
          --branch=main
